name: arc-eval-service

# Brings up Postgres (the database this service depends on) and the eval-service
# itself. The service runs `alembic upgrade head` before serving, so the schema
# is always current. For local development against `make run`, start just the
# database with `docker compose up db`.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arc}
      POSTGRES_DB: ${POSTGRES_DB:-arc_eval}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - arc-eval-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arc} -d ${POSTGRES_DB:-arc_eval}"]
      interval: 5s
      timeout: 3s
      retries: 10

  eval-service:
    build: .
    depends_on:
      db:
        condition: service_healthy
    # Model profiles, the provider API key, the API host/port, and the other
    # ARC_EVAL_* settings come from `.env` (copied from .env.example). It is
    # optional, so the stack still starts without it; with no judge model
    # configured, /v1/evaluate returns no scores (metrics error).
    env_file:
      - path: .env
        required: false
    environment:
      # Fixed to the compose network host: inside the stack the database is
      # reached at `db`, not localhost. This overrides any ARC_EVAL_DATABASE_URL
      # supplied by .env (which targets localhost for `make run`).
      ARC_EVAL_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-arc}:${POSTGRES_PASSWORD:-arc}@db:5432/${POSTGRES_DB:-arc_eval}
    # The app binds ARC_EVAL_API_HOST/ARC_EVAL_API_PORT (config.py) after
    # migrating, so a single .env drives the in-container bind and the published
    # port below.
    ports:
      - "${ARC_EVAL_API_PORT:-8000}:${ARC_EVAL_API_PORT:-8000}"
    command:
      - sh
      - -c
      - alembic upgrade head && python -m arc_eval_service.app

volumes:
  arc-eval-db:
