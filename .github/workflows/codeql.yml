name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly, catches newly disclosed patterns

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
          # Alembic version modules expose framework-required globals (revision,
          # down_revision, branch_labels, depends_on) that py/unused-global-variable
          # reports as unused. Exclude the version files; migrations/env.py stays in scope.
          config: |
            paths-ignore:
              - migrations/versions
      - uses: github/codeql-action/analyze@v3
